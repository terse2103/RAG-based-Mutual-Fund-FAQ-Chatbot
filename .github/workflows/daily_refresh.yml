name: Daily Data Refresh

on:
  schedule:
    # 10:00 AM IST is 04:30 AM UTC
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright apscheduler sentence-transformers torch
          playwright install chromium

      - name: Run data refresh script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_refresh.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ logs/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: daily data refresh [skip ci]" && git pull --rebase && git push)
